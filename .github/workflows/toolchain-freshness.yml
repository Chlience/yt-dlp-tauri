name: Toolchain Freshness

on:
  schedule:
    - cron: "23 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  yt-dlp:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check latest yt-dlp release
        run: node scripts/check-yt-dlp-release.mjs
