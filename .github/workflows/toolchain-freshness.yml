name: Toolchain Freshness

on:
  schedule:
    - cron: "23 2 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  yt-dlp:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Check latest yt-dlp release
        id: check-latest-yt-dlp-release
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/check-yt-dlp-release.mjs

      - name: Check open yt-dlp update pull request
        if: steps.check-latest-yt-dlp-release.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          pr_number="$(gh pr list --head bot/update-yt-dlp --state open --json number --jq '.[0].number // ""')"
          if [ -z "$pr_number" ]; then
            echo "::error::yt-dlp manifest is stale and no bot update PR is open."
            exit 1
          fi

          echo "::notice::yt-dlp manifest is stale; update PR #${pr_number} is already open."

      - name: Check tool source URLs
        run: node scripts/check-tool-source-urls.mjs
