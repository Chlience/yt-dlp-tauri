name: Update yt-dlp Manifest

on:
  schedule:
    - cron: "23 1 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-yt-dlp
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Update yt-dlp manifest
        id: update
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          node scripts/update-yt-dlp-manifest.mjs --release-fixture tests/fixtures/yt-dlp-latest-release.json --changelog CHANGELOG.md --windows-download-script scripts/download-tools.ps1

          if git diff --quiet -- src-tauri/tools-manifest.json tests/fixtures/yt-dlp-latest-release.json scripts/download-tools.ps1 CHANGELOG.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          version="$(node -e "const manifest = JSON.parse(require('node:fs').readFileSync('src-tauri/tools-manifest.json', 'utf8')); console.log(manifest.targets[0].tools.find((tool) => tool.name === 'yt-dlp').version)")"
          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Install Node dependencies
        if: steps.update.outputs.changed == 'true'
        run: npm ci

      - name: Test frontend and scripts
        if: steps.update.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          npm test
          node scripts/check-yt-dlp-release.mjs
          node scripts/check-tool-source-urls.mjs

      - name: Create or update pull request
        if: steps.update.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          YT_DLP_VERSION: ${{ steps.update.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B bot/update-yt-dlp
          git add src-tauri/tools-manifest.json tests/fixtures/yt-dlp-latest-release.json scripts/download-tools.ps1 CHANGELOG.md
          git commit -m "chore: update yt-dlp to ${YT_DLP_VERSION}" -m "chore: 更新 yt-dlp 到 ${YT_DLP_VERSION}"
          git push --force-with-lease origin bot/update-yt-dlp

          cat > /tmp/yt-dlp-update-pr.md <<EOF
          ## Summary
          - Update managed yt-dlp binaries to ${YT_DLP_VERSION}
          - Refresh the release-check fixture, Windows restore script, and changelog entry
          - Keep tool source URLs and SHA-256 pins verified

          ## Test Plan
          - npm test
          - node scripts/check-yt-dlp-release.mjs
          - node scripts/check-tool-source-urls.mjs
          EOF

          pr_number="$(gh pr list --head bot/update-yt-dlp --state open --json number --jq '.[0].number // ""')"
          if [ -n "$pr_number" ]; then
            gh pr edit "$pr_number" --title "chore: update yt-dlp to ${YT_DLP_VERSION}" --body-file /tmp/yt-dlp-update-pr.md
          else
            gh pr create --head bot/update-yt-dlp --base main --title "chore: update yt-dlp to ${YT_DLP_VERSION}" --body-file /tmp/yt-dlp-update-pr.md
          fi
